<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Коробка отпущения</title>
    <meta name="robots" content="noindex, nofollow" />
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        base-uri 'self';
        object-src 'none';
        frame-src 'none';
        form-action 'self';
        img-src 'self' data:;
        font-src 'self' https://fonts.gstatic.com;
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        script-src 'self';
        connect-src 'self' https://render.trezvyeperevozchikivmax.online;
        media-src 'self' blob: https://render.trezvyeperevozchikivmax.online;
      "
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Inter:wght@400;500;700&family=Unbounded:wght@700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --page-bg: linear-gradient(180deg, #edf1ff 0%, #d8def6 100%);
        --card-bg: rgba(255, 255, 255, 0.8);
        --card-stroke: rgba(36, 56, 136, 0.14);
        --ink: #243888;
        --ink-muted: rgba(36, 56, 136, 0.64);
        --button-bg: #4f5b97;
        --button-fg: #f5f7ff;
        --button-secondary-bg: rgba(255, 255, 255, 0.62);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Inter", sans-serif;
        color: var(--ink);
        background: var(--page-bg);
      }

      .share-player-page {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        gap: 6px;
        padding: 10px 16px 20px;
      }

      .share-player-card {
        width: min(100%, 520px);
        border-radius: 28px;
        padding: 18px;
        background: var(--card-bg);
        border: 1px solid var(--card-stroke);
        box-shadow: 0 24px 72px rgba(36, 56, 136, 0.12);
        backdrop-filter: blur(18px);
      }

      .share-player-topbar {
        display: flex;
        justify-content: flex-start;
        width: min(100%, 520px);
      }

      .share-player-back {
        appearance: none;
        border: 1px solid rgba(36, 56, 136, 0.14);
        border-radius: 999px;
        min-height: 36px;
        padding: 0 14px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        background: rgba(255, 255, 255, 0.56);
        color: var(--ink);
        font: 600 14px/1 "Inter", sans-serif;
        cursor: pointer;
        box-shadow: 0 10px 24px rgba(36, 56, 136, 0.08);
        transition:
          background 160ms ease,
          transform 160ms ease,
          border-color 160ms ease;
      }

      .share-player-back::before {
        content: "←";
        font-size: 15px;
        line-height: 1;
      }

      .share-player-back:hover {
        background: rgba(255, 255, 255, 0.78);
        border-color: rgba(36, 56, 136, 0.22);
      }

      .share-player-back:active {
        transform: translateY(1px);
      }

      .share-player-title {
        margin: 0 0 8px;
        font-family: "Unbounded", sans-serif;
        font-size: clamp(26px, 6.2vw, 38px);
        line-height: 0.95;
        letter-spacing: -0.04em;
        text-align: center;
      }

      .share-player-copy {
        margin-bottom: 12px;
      }

      .share-player-panel {
        display: none;
      }

      .share-player-panel-kicker,
      .share-player-panel-title,
      .share-player-panel-copy {
        margin: 0;
      }

      .share-player-status {
        margin: 0 0 8px;
        color: var(--ink-muted);
        font-size: 15px;
        line-height: 1.4;
        text-align: center;
      }

      .share-player-status[hidden] {
        display: none;
      }

      .share-player-frame {
        position: relative;
        overflow: hidden;
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.66);
        border: 1px solid rgba(36, 56, 136, 0.08);
      }

      .share-player-body {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .share-player-sidebar {
        display: flex;
        flex-direction: column;
      }

      .share-player-video {
        display: block;
        width: 100%;
        aspect-ratio: 9 / 16;
        background: #ccd4ef;
      }

      .share-player-loader {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 22px;
        background:
          radial-gradient(circle at top, rgba(255, 255, 255, 0.7), rgba(216, 222, 246, 0.95)),
          rgba(216, 222, 246, 0.92);
        transition: opacity 180ms ease;
      }

      .share-player-loader[hidden] {
        opacity: 0;
        pointer-events: none;
      }

      .share-player-loader-shell {
        width: 100%;
        max-width: 280px;
        padding: 24px 20px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(36, 56, 136, 0.1);
        box-shadow: 0 18px 40px rgba(36, 56, 136, 0.08);
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 14px;
      }

      .share-player-spinner {
        width: 54px;
        height: 54px;
        display: block;
        object-fit: contain;
        animation: share-player-spin 2.4s linear infinite;
        transform-origin: center;
        filter: drop-shadow(0 10px 22px rgba(36, 56, 136, 0.12));
      }

      .share-player-loader-title {
        margin: 0;
        font-family: "Unbounded", sans-serif;
        font-size: clamp(22px, 6vw, 28px);
        line-height: 0.95;
        letter-spacing: -0.04em;
        max-width: 8.5ch;
        text-wrap: balance;
      }

      .share-player-loader-copy {
        margin: 0;
        color: var(--ink-muted);
        font-size: 14px;
        line-height: 1.35;
      }

      @keyframes share-player-spin {
        to {
          transform: rotate(360deg);
        }
      }

      .share-player-actions {
        display: flex;
        gap: 12px;
      }

      .share-player-button,
      .share-player-link {
        appearance: none;
        border: 0;
        border-radius: 999px;
        min-height: 56px;
        padding: 0 22px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        font: 700 16px/1 "Inter", sans-serif;
        cursor: pointer;
      }

      .share-player-button {
        flex: 1 1 auto;
        color: var(--button-fg);
        background: var(--button-bg);
      }

      .share-player-link {
        flex: 0 0 auto;
        color: var(--ink);
        background: var(--button-secondary-bg);
      }

      @media (max-width: 767px) {
        .share-player-link {
          display: none;
        }

        .share-player-button {
          width: 100%;
        }
      }

      @media (min-width: 768px) {
        .share-player-page {
          justify-content: center;
          gap: clamp(12px, 1.5vw, 18px);
          padding: clamp(14px, 2vw, 28px);
        }

        .share-player-topbar,
        .share-player-card {
          width: min(100%, 1040px);
        }

        .share-player-card {
          padding: clamp(18px, 2.2vw, 28px);
          border-radius: 30px;
          background:
            radial-gradient(circle at top right, rgba(103, 120, 182, 0.24), transparent 34%),
            linear-gradient(180deg, rgba(255, 255, 255, 0.94), rgba(244, 247, 255, 0.86));
          box-shadow:
            0 28px 96px rgba(36, 56, 136, 0.15),
            inset 0 1px 0 rgba(255, 255, 255, 0.72);
        }

        .share-player-back {
          min-height: 42px;
          padding: 0 18px;
          font-size: 18px;
        }

        .share-player-back::before {
          font-size: 18px;
        }

        .share-player-copy {
          margin-bottom: clamp(12px, 1.8vw, 20px);
        }

        .share-player-title {
          margin-bottom: 8px;
          max-width: 11ch;
          font-size: clamp(34px, 4vw, 52px);
          text-align: left;
        }

        .share-player-status {
          margin-bottom: 0;
          max-width: 44ch;
          font-size: 15px;
          line-height: 1.5;
          text-align: left;
        }

        .share-player-body {
          display: flex;
          flex-direction: column;
          gap: 16px;
        }

        .share-player-frame {
          width: 100%;
          max-width: min(100%, 360px);
          margin: 0 auto;
          border-radius: 24px;
          background:
            linear-gradient(180deg, rgba(255, 255, 255, 0.7), rgba(222, 228, 248, 0.92)),
            rgba(255, 255, 255, 0.68);
          box-shadow:
            inset 0 1px 0 rgba(255, 255, 255, 0.78),
            0 14px 36px rgba(36, 56, 136, 0.08);
        }

        .share-player-sidebar {
          min-height: 0;
          padding: 18px;
          border-radius: 24px;
          background:
            linear-gradient(180deg, rgba(245, 247, 255, 0.9), rgba(229, 235, 252, 0.88));
          border: 1px solid rgba(36, 56, 136, 0.09);
          box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7);
          justify-content: space-between;
          gap: 18px;
        }

        .share-player-panel {
          display: flex;
          flex-direction: column;
          gap: 10px;
        }

        .share-player-panel-kicker {
          color: rgba(36, 56, 136, 0.6);
          font-size: 13px;
          font-weight: 700;
          letter-spacing: 0.08em;
          text-transform: uppercase;
        }

        .share-player-panel-title {
          max-width: 12ch;
          font-family: "Unbounded", sans-serif;
          font-size: clamp(22px, 2.2vw, 32px);
          line-height: 1;
          letter-spacing: -0.04em;
        }

        .share-player-panel-copy {
          max-width: 34ch;
          color: rgba(36, 56, 136, 0.7);
          font-size: 15px;
          line-height: 1.45;
        }

        .share-player-frame,
        .share-player-video {
          max-height: min(58vh, 620px);
        }

        .share-player-loader {
          padding: 20px;
        }

        .share-player-loader-shell {
          max-width: 230px;
          padding: 18px 16px;
          border-radius: 22px;
          gap: 10px;
        }

        .share-player-spinner {
          width: 44px;
          height: 44px;
        }

        .share-player-loader-title {
          max-width: 7ch;
          font-size: clamp(18px, 2vw, 26px);
        }

        .share-player-loader-copy {
          font-size: 13px;
        }

        .share-player-actions {
          flex-direction: row;
          flex-wrap: wrap;
          gap: 12px;
          margin-top: auto;
        }

        .share-player-button,
        .share-player-link {
          min-width: 160px;
          min-height: 50px;
          font-size: 16px;
        }
      }

      @media (min-width: 1024px) {
        .share-player-body {
          display: grid;
          grid-template-columns:
            minmax(260px, min(34vw, 360px))
            minmax(280px, 1fr);
          align-items: stretch;
          gap: clamp(18px, 2.2vw, 28px);
        }

        .share-player-frame {
          width: min(100%, calc((100vh - 210px) * 9 / 16));
          max-width: 360px;
          margin: 0;
        }

        .share-player-sidebar {
          min-height: min(58vh, 620px);
        }

        .share-player-actions {
          flex-direction: column;
        }

        .share-player-button,
        .share-player-link {
          width: 100%;
        }
      }

      .share-player-button:disabled,
      .share-player-link[aria-disabled="true"] {
        opacity: 0.48;
        pointer-events: none;
      }

      @media (prefers-reduced-motion: reduce) {
        .share-player-spinner {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <main class="share-player-page">
      <div class="share-player-topbar">
        <button class="share-player-back" id="share-player-back" type="button">
          Назад
        </button>
      </div>
      <section class="share-player-card">
        <div class="share-player-copy">
          <h1 class="share-player-title" id="share-player-title">Вот она, родимая</h1>
          <p class="share-player-status" id="share-player-status" hidden></p>
        </div>

        <div class="share-player-body">
          <div class="share-player-frame">
            <div class="share-player-loader" id="share-player-loader">
              <div class="share-player-loader-shell">
                <img
                  class="share-player-spinner"
                  src="./assets/loader.png"
                  alt=""
                  aria-hidden="true"
                  width="114"
                  height="112"
                />
                <p class="share-player-loader-title" id="share-player-loader-title">Собираем!</p>
                <p class="share-player-loader-copy" id="share-player-loader-copy">15 секунд</p>
              </div>
            </div>
            <video
              class="share-player-video"
              id="share-player-video"
              muted
              autoplay
              controls
              playsinline
              preload="metadata"
            ></video>
          </div>

          <aside class="share-player-sidebar">
            <div class="share-player-panel">
              <p class="share-player-panel-kicker" id="share-player-panel-kicker">Подготовка к отправке</p>
              <h2 class="share-player-panel-title" id="share-player-panel-title">Заклеиваем коробку</h2>
              <p class="share-player-panel-copy" id="share-player-panel-copy">
                Подождите чуть-чуть. Утрамбовываем ваши эмоции и щедро обматываем скотчем. Как только закончим, коробка появится здесь.
              </p>
            </div>
            <div class="share-player-actions">
              <button class="share-player-button" id="share-player-share" type="button" disabled>
                Поделиться
              </button>
              <a class="share-player-link" id="share-player-download" href="/" aria-disabled="true">
                Сохранить на память
              </a>
            </div>
          </aside>
        </div>
      </section>
    </main>

    <script src="./hotbox-video-renderer.js"></script>
    <script src="./share-player.js"></script>
  </body>
</html>
