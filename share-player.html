<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Коробка отпущения</title>
    <meta name="robots" content="noindex, nofollow" />
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        base-uri 'self';
        object-src 'none';
        frame-src 'none';
        form-action 'self';
        img-src 'self' data: blob:;
        font-src 'self' https://fonts.gstatic.com;
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        script-src 'self';
        connect-src 'self' https://render.trezvyeperevozchikivmax.online;
        media-src 'self' blob: https://render.trezvyeperevozchikivmax.online;
      "
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Inter:wght@400;500;700&family=Unbounded:wght@700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --page-bg: linear-gradient(180deg, #edf1ff 0%, #d8def6 100%);
        --card-bg: rgba(255, 255, 255, 0.8);
        --card-stroke: rgba(36, 56, 136, 0.14);
        --ink: #243888;
        --ink-muted: rgba(36, 56, 136, 0.64);
        --button-bg: #4f5b97;
        --button-fg: #f5f7ff;
        --button-secondary-bg: rgba(255, 255, 255, 0.62);
        --desktop-content-width: 940px;
        --desktop-sidebar-width: 300px;
        --desktop-grid-gap: 40px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Inter", sans-serif;
        color: var(--ink);
        background: var(--page-bg);
      }

      .share-player-page {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        gap: 6px;
        padding: 10px 16px 20px;
      }

      .share-player-card {
        width: min(100%, 520px);
        border-radius: 28px;
        padding: 18px;
        background: var(--card-bg);
        border: 1px solid var(--card-stroke);
        box-shadow: 0 24px 72px rgba(36, 56, 136, 0.12);
        backdrop-filter: blur(18px);
      }

      .share-player-topbar {
        display: flex;
        justify-content: flex-start;
        width: min(100%, 520px);
      }

      .share-player-back {
        appearance: none;
        border: 1px solid rgba(36, 56, 136, 0.14);
        border-radius: 999px;
        min-height: 36px;
        padding: 0 14px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        background: rgba(255, 255, 255, 0.56);
        color: var(--ink);
        font: 600 14px/1 "Inter", sans-serif;
        cursor: pointer;
        box-shadow: 0 10px 24px rgba(36, 56, 136, 0.08);
        transition:
          background 160ms ease,
          transform 160ms ease,
          border-color 160ms ease;
      }

      .share-player-back::before {
        content: "←";
        font-size: 15px;
        line-height: 1;
      }

      .share-player-back:hover {
        background: rgba(255, 255, 255, 0.78);
        border-color: rgba(36, 56, 136, 0.22);
      }

      .share-player-back:active {
        transform: translateY(1px);
      }

      .share-player-title {
        margin: 0 0 8px;
        font-family: "Unbounded", sans-serif;
        font-size: clamp(26px, 6.2vw, 38px);
        line-height: 0.95;
        letter-spacing: -0.04em;
        text-align: center;
      }

      .share-player-copy {
        margin-bottom: 12px;
      }

      .share-player-panel {
        display: none;
      }

      .share-player-panel-kicker,
      .share-player-panel-title,
      .share-player-panel-copy {
        margin: 0;
      }

      .share-player-frame {
        position: relative;
        overflow: hidden;
        aspect-ratio: 9 / 16;
        border-radius: 22px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.82), rgba(221, 228, 249, 0.94)),
          rgba(255, 255, 255, 0.7);
        border: 1px solid rgba(36, 56, 136, 0.12);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.72),
          0 18px 44px rgba(36, 56, 136, 0.11);
      }

      .share-player-body {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .share-player-sidebar {
        display: flex;
        flex-direction: column;
      }

      .share-player-video {
        position: absolute;
        inset: 0;
        z-index: 1;
        display: block;
        width: 100%;
        height: 100%;
        object-fit: contain;
        background: #ccd4ef;
      }

      .share-player-image {
        position: absolute;
        inset: 0;
        z-index: 1;
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
        background: #ccd4ef;
      }

      .share-player-video[hidden],
      .share-player-image[hidden] {
        display: none;
      }

      .share-player-loader {
        position: absolute;
        inset: 0;
        z-index: 2;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 22px;
        background:
          radial-gradient(circle at top, rgba(255, 255, 255, 0.7), rgba(216, 222, 246, 0.95)),
          rgba(216, 222, 246, 0.92);
        transition: opacity 180ms ease;
      }

      .share-player-loader[hidden] {
        opacity: 0;
        pointer-events: none;
      }

      .share-player-loader-shell {
        width: 100%;
        max-width: 280px;
        padding: 24px 20px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(36, 56, 136, 0.1);
        box-shadow: 0 18px 40px rgba(36, 56, 136, 0.08);
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 14px;
      }

      .share-player-spinner {
        width: 54px;
        height: 54px;
        display: block;
        object-fit: contain;
        animation: share-player-spin 2.4s linear infinite;
        transform-origin: center;
        filter: drop-shadow(0 10px 22px rgba(36, 56, 136, 0.12));
      }

      .share-player-loader-title {
        margin: 0;
        font-family: "Unbounded", sans-serif;
        font-size: clamp(22px, 6vw, 28px);
        line-height: 0.95;
        letter-spacing: -0.04em;
        max-width: 8.5ch;
        text-wrap: balance;
        overflow-wrap: anywhere;
        word-break: break-word;
      }

        .share-player-loader-copy {
          margin: 0;
          color: var(--ink-muted);
          font-size: 14px;
          line-height: 1.35;
          white-space: pre-line;
        }

      @keyframes share-player-spin {
        to {
          transform: rotate(360deg);
        }
      }

      .share-player-actions {
        display: flex;
        gap: 12px;
      }

      .share-player-button,
      .share-player-link {
        appearance: none;
        border: 1px solid transparent;
        border-radius: 999px;
        min-height: 56px;
        padding: 0 22px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        font: 700 16px/1 "Inter", sans-serif;
        cursor: pointer;
        transition:
          transform 160ms ease,
          box-shadow 160ms ease,
          border-color 160ms ease,
          background 160ms ease;
      }

      .share-player-button {
        flex: 1 1 auto;
        color: var(--button-fg);
        background: linear-gradient(180deg, #3d51b8 0%, #2d42a8 100%);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.18),
          0 14px 28px rgba(45, 66, 168, 0.28);
      }

      .share-player-link {
        flex: 0 0 auto;
        color: var(--ink);
        background: rgba(255, 255, 255, 0.42);
        border-color: rgba(36, 56, 136, 0.1);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.62);
      }

      .share-player-button:hover,
      .share-player-link:hover {
        transform: translateY(-1px);
      }

      .share-player-button:hover {
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.2),
          0 18px 32px rgba(79, 91, 151, 0.22);
      }

      .share-player-link:hover {
        background: rgba(255, 255, 255, 0.58);
        border-color: rgba(36, 56, 136, 0.15);
      }

      @media (max-width: 767px) {
        .share-player-link {
          display: none;
        }

        .share-player-button {
          width: 100%;
        }

        .share-player-loader {
          padding: 18px;
        }

        .share-player-loader-shell {
          width: min(100%, 272px);
          max-width: 272px;
          min-height: 216px;
          padding: 22px 18px;
          justify-content: center;
          gap: 12px;
        }

        .share-player-spinner {
          width: 50px;
          height: 50px;
        }

        .share-player-loader-title {
          width: 100%;
          max-width: 100%;
          min-height: 2.1em;
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: clamp(16px, 5.2vw, 21px);
          line-height: 0.98;
        }

        .share-player-loader-copy {
          min-height: 1.35em;
          font-size: clamp(12px, 4.2vw, 14px);
        }
      }

      @media (min-width: 768px) {
        .share-player-page {
          --share-player-frame-max-height: min(54dvh, 560px);
        }

        .share-player-page {
          justify-content: center;
          gap: clamp(16px, 1.8vw, 22px);
          padding: clamp(20px, 2.2vw, 30px);
        }

        .share-player-topbar,
        .share-player-card {
          width: min(100%, 1120px);
        }

        .share-player-card {
          padding: clamp(24px, 2.8vw, 36px);
          border-radius: 34px;
          background:
            radial-gradient(circle at top right, rgba(103, 120, 182, 0.24), transparent 34%),
            linear-gradient(180deg, rgba(255, 255, 255, 0.94), rgba(244, 247, 255, 0.86));
          box-shadow:
            0 28px 96px rgba(36, 56, 136, 0.15),
            inset 0 1px 0 rgba(255, 255, 255, 0.72);
        }

        .share-player-back {
          min-height: 46px;
          padding: 0 20px;
          font-size: 19px;
        }

        .share-player-back::before {
          font-size: 19px;
        }

        .share-player-copy {
          width: min(100%, var(--desktop-content-width));
          margin-inline: auto;
          margin-bottom: clamp(16px, 1.9vw, 24px);
        }

        .share-player-title {
          margin-bottom: 10px;
          max-width: 9ch;
          font-size: clamp(34px, 4vw, 50px);
          text-align: left;
        }

        .share-player-body {
          display: flex;
          flex-direction: column;
          width: min(100%, var(--desktop-content-width));
          margin: 0 auto;
          gap: 20px;
        }

        .share-player-frame {
          width: min(100%, calc(var(--share-player-frame-max-height) * 9 / 16));
          max-width: calc(var(--share-player-frame-max-height) * 9 / 16);
          margin: 0 auto;
          border-radius: 28px;
        }

        .share-player-sidebar {
          min-height: 0;
          padding: 20px 22px;
          border-radius: 28px;
          background:
            linear-gradient(180deg, rgba(247, 249, 255, 0.9), rgba(232, 237, 252, 0.9));
          border: 1px solid rgba(36, 56, 136, 0.1);
          box-shadow:
            inset 0 1px 0 rgba(255, 255, 255, 0.78),
            0 12px 28px rgba(36, 56, 136, 0.05);
          justify-content: flex-start;
          gap: 16px;
        }

        .share-player-panel {
          display: flex;
          flex-direction: column;
          flex: 1 1 auto;
          justify-content: center;
          gap: 12px;
        }

        .share-player-panel-kicker {
          color: rgba(36, 56, 136, 0.6);
          font-size: 12px;
          font-weight: 700;
          letter-spacing: 0.09em;
          text-transform: uppercase;
        }

        .share-player-panel-title {
          max-width: 13ch;
          font-family: "Unbounded", sans-serif;
          font-size: clamp(20px, 1.8vw, 26px);
          line-height: 0.96;
          letter-spacing: -0.04em;
        }

        .share-player-panel-copy {
          max-width: 32ch;
          color: rgba(36, 56, 136, 0.7);
          font-size: 15px;
          line-height: 1.5;
        }

        .share-player-frame,
        .share-player-video,
        .share-player-image {
          max-height: var(--share-player-frame-max-height);
        }

        .share-player-loader {
          padding: 24px;
        }

        .share-player-loader-shell {
          width: 230px;
          max-width: 230px;
          min-height: 200px;
          padding: 18px 16px;
          border-radius: 22px;
          justify-content: center;
          gap: 10px;
        }

        .share-player-spinner {
          width: 44px;
          height: 44px;
        }

        .share-player-loader-title {
          width: 100%;
          max-width: 100%;
          font-size: clamp(16px, 1.7vw, 22px);
          line-height: 0.98;
        }

        .share-player-loader-copy {
          font-size: 13px;
        }

        .share-player-actions {
          flex-direction: row;
          flex-wrap: wrap;
          gap: 14px;
          margin-top: auto;
        }

        .share-player-button,
        .share-player-link {
          min-width: 160px;
          min-height: 54px;
          font-size: 17px;
        }
      }

      @media (min-width: 1024px) {
        .share-player-page {
          --share-player-frame-max-height: min(calc(100dvh - 340px), 660px);
        }

        .share-player-body {
          width: min(
            100%,
            calc(
              (var(--share-player-frame-max-height) * 9 / 16) +
              var(--desktop-sidebar-width) +
              var(--desktop-grid-gap)
            )
          );
          display: grid;
          grid-template-columns:
            calc(var(--share-player-frame-max-height) * 9 / 16)
            var(--desktop-sidebar-width);
          justify-content: center;
          align-items: start;
          gap: var(--desktop-grid-gap);
        }

        .share-player-left {
          display: flex;
          flex-direction: column;
          gap: 14px;
        }

        .share-player-copy {
          width: 100%;
          margin: 0;
        }

        .share-player-title {
          font-size: clamp(26px, 2.8vw, 38px);
          margin-bottom: 0;
        }

        .share-player-frame {
          width: 100%;
          max-width: none;
          margin: 0;
        }

        /* Right column: starts at frame level, content vertically centered within frame height */
        .share-player-sidebar {
          align-self: stretch;
          padding: 0;
          background: none;
          border: none;
          box-shadow: none;
          border-radius: 0;
          display: flex;
          flex-direction: column;
          justify-content: center;
          gap: 20px;
          /* push content down to align with the frame area, past the title row */
          padding-top: clamp(50px, 6.5vw, 90px);
        }

        .share-player-panel {
          flex: 0 0 auto;
          padding-block: 0;
          justify-content: flex-start;
          align-items: center;
          text-align: center;
        }

        .share-player-panel-kicker,
        .share-player-panel-title,
        .share-player-panel-copy {
          text-align: center;
          max-width: none;
        }

        .share-player-panel-title {
          max-width: 16ch;
        }

        .share-player-panel-copy {
          max-width: 26ch;
        }

        .share-player-actions {
          flex: 0 0 auto;
          flex-direction: row;
          flex-wrap: nowrap;
          gap: 10px;
          justify-content: center;
          align-items: center;
          margin-top: 0;
          width: 100%;
        }

        .share-player-button {
          flex: 1 1 0;
          min-width: 0;
          width: auto;
          padding: 0 16px;
          min-height: 42px;
          font-size: 15px;
        }

        .share-player-link {
          flex: 0 0 auto;
          width: auto;
          padding: 0;
          background: none;
          border-color: transparent;
          box-shadow: none;
          font-size: 14px;
          font-weight: 600;
          color: var(--ink-muted);
          white-space: nowrap;
          text-decoration: underline;
          text-decoration-color: rgba(36, 56, 136, 0.28);
          text-underline-offset: 3px;
          min-height: auto;
        }
      }

      .share-player-title {
        transition: opacity 280ms ease;
      }

      .is-unavailable .share-player-title {
        opacity: 0.38;
      }

      .share-player-button:disabled,
      .share-player-link[aria-disabled="true"] {
        opacity: 0.48;
        pointer-events: none;
      }

      @media (prefers-reduced-motion: reduce) {
        .share-player-spinner {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <main class="share-player-page">
      <div class="share-player-topbar">
        <button class="share-player-back" id="share-player-back" type="button">
          Назад
        </button>
      </div>
      <section class="share-player-card">
        <div class="share-player-body">
          <div class="share-player-left">
            <div class="share-player-copy">
              <h1 class="share-player-title" id="share-player-title">Вот она, родимая</h1>
            </div>
            <div class="share-player-frame">
            <div class="share-player-loader" id="share-player-loader">
              <div class="share-player-loader-shell">
                <img
                  class="share-player-spinner"
                  src="./assets/loader.png"
                  alt=""
                  aria-hidden="true"
                  width="114"
                  height="112"
                />
                <p class="share-player-loader-title" id="share-player-loader-title">Собираем!</p>
                <p class="share-player-loader-copy" id="share-player-loader-copy">15 секунд</p>
              </div>
            </div>
            <video
              class="share-player-video"
              id="share-player-video"
              muted
              autoplay
              controls
              playsinline
              preload="metadata"
              hidden
            ></video>
            <img
              class="share-player-image"
              id="share-player-image"
              alt="Подготовленная коробка"
              hidden
            />
          </div>
          </div><!-- /.share-player-left -->

          <aside class="share-player-sidebar">
            <div class="share-player-panel">
              <p class="share-player-panel-kicker" id="share-player-panel-kicker">Подготовка к отправке</p>
              <h2 class="share-player-panel-title" id="share-player-panel-title">Заклеиваем коробку</h2>
              <p class="share-player-panel-copy" id="share-player-panel-copy">
                Подождите чуть-чуть. Утрамбовываем ваши эмоции и щедро обматываем скотчем. Как только закончим, коробка появится здесь.
              </p>
            </div>
            <div class="share-player-actions">
              <button class="share-player-button" id="share-player-share" type="button" disabled>
                Поделиться
              </button>
              <a class="share-player-link" id="share-player-download" href="/" aria-disabled="true">
                Сохранить на память
              </a>
            </div>
          </aside>
        </div>
      </section>
    </main>

    <script src="./hotbox-video-renderer.js"></script>
    <script src="./share-player.js"></script>
  </body>
</html>
