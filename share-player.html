<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Готовая коробка</title>
    <meta name="robots" content="noindex, nofollow" />
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        base-uri 'self';
        object-src 'none';
        frame-src 'none';
        form-action 'self';
        img-src 'self' data:;
        font-src 'self' https://fonts.gstatic.com;
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        script-src 'self';
        connect-src 'self' https://render.trezvyeperevozchikivmax.online;
        media-src 'self' blob: https://render.trezvyeperevozchikivmax.online;
      "
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Unbounded:wght@700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --page-bg: linear-gradient(180deg, #edf1ff 0%, #d8def6 100%);
        --card-bg: rgba(255, 255, 255, 0.8);
        --card-stroke: rgba(36, 56, 136, 0.14);
        --ink: #243888;
        --ink-muted: rgba(36, 56, 136, 0.64);
        --button-bg: #4f5b97;
        --button-fg: #f5f7ff;
        --button-secondary-bg: rgba(255, 255, 255, 0.62);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Inter", sans-serif;
        color: var(--ink);
        background: var(--page-bg);
      }

      .share-player-page {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        gap: 6px;
        padding: 10px 16px 20px;
      }

      .share-player-card {
        width: min(100%, 520px);
        border-radius: 28px;
        padding: 18px;
        background: var(--card-bg);
        border: 1px solid var(--card-stroke);
        box-shadow: 0 24px 72px rgba(36, 56, 136, 0.12);
        backdrop-filter: blur(18px);
      }

      .share-player-topbar {
        display: flex;
        justify-content: flex-start;
        width: min(100%, 520px);
      }

      .share-player-back {
        appearance: none;
        border: 1px solid rgba(36, 56, 136, 0.14);
        border-radius: 999px;
        min-height: 36px;
        padding: 0 14px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        background: rgba(255, 255, 255, 0.56);
        color: var(--ink);
        font: 600 14px/1 "Inter", sans-serif;
        cursor: pointer;
        box-shadow: 0 10px 24px rgba(36, 56, 136, 0.08);
        transition:
          background 160ms ease,
          transform 160ms ease,
          border-color 160ms ease;
      }

      .share-player-back::before {
        content: "←";
        font-size: 15px;
        line-height: 1;
      }

      .share-player-back:hover {
        background: rgba(255, 255, 255, 0.78);
        border-color: rgba(36, 56, 136, 0.22);
      }

      .share-player-back:active {
        transform: translateY(1px);
      }

      .share-player-title {
        margin: 0 0 8px;
        font-family: "Unbounded", sans-serif;
        font-size: clamp(26px, 6.2vw, 38px);
        line-height: 0.95;
        letter-spacing: -0.04em;
        text-align: center;
      }

      .share-player-status {
        margin: 0 0 8px;
        color: var(--ink-muted);
        font-size: 15px;
        line-height: 1.4;
        text-align: center;
      }

      .share-player-status[hidden] {
        display: none;
      }

      .share-player-frame {
        position: relative;
        overflow: hidden;
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.66);
        border: 1px solid rgba(36, 56, 136, 0.08);
      }

      .share-player-video {
        display: block;
        width: 100%;
        aspect-ratio: 9 / 16;
        background: #ccd4ef;
      }

      .share-player-loader {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 22px;
        background:
          radial-gradient(circle at top, rgba(255, 255, 255, 0.7), rgba(216, 222, 246, 0.95)),
          rgba(216, 222, 246, 0.92);
        transition: opacity 180ms ease;
      }

      .share-player-loader[hidden] {
        opacity: 0;
        pointer-events: none;
      }

      .share-player-loader-shell {
        width: 100%;
        max-width: 280px;
        padding: 24px 20px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(36, 56, 136, 0.1);
        box-shadow: 0 18px 40px rgba(36, 56, 136, 0.08);
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 14px;
      }

      .share-player-spinner {
        width: 54px;
        height: 54px;
        border-radius: 999px;
        border: 3px solid rgba(36, 56, 136, 0.18);
        border-top-color: var(--ink);
        animation: share-player-spin 0.9s linear infinite;
      }

      .share-player-loader-title {
        margin: 0;
        font-family: "Unbounded", sans-serif;
        font-size: clamp(22px, 6vw, 28px);
        line-height: 0.95;
        letter-spacing: -0.04em;
      }

      .share-player-loader-copy {
        margin: 0;
        color: var(--ink-muted);
        font-size: 14px;
        line-height: 1.35;
      }

      @keyframes share-player-spin {
        to {
          transform: rotate(360deg);
        }
      }

      .share-player-actions {
        display: flex;
        gap: 12px;
        margin-top: 14px;
      }

      .share-player-button,
      .share-player-link {
        appearance: none;
        border: 0;
        border-radius: 999px;
        min-height: 56px;
        padding: 0 22px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        font: 700 16px/1 "Inter", sans-serif;
        cursor: pointer;
      }

      .share-player-button {
        flex: 1 1 auto;
        color: var(--button-fg);
        background: var(--button-bg);
      }

      .share-player-link {
        flex: 0 0 auto;
        color: var(--ink);
        background: var(--button-secondary-bg);
      }

      @media (max-width: 767px) {
        .share-player-link {
          display: none;
        }

        .share-player-button {
          width: 100%;
        }
      }

      @media (min-width: 768px) {
        .share-player-page {
          gap: 4px;
          padding: 8px 16px 14px;
        }

        .share-player-topbar,
        .share-player-card {
          width: min(100%, 360px);
        }

        .share-player-card {
          padding: 14px;
          border-radius: 24px;
        }

        .share-player-title {
          margin-bottom: 6px;
          font-size: 32px;
        }

        .share-player-frame,
        .share-player-video {
          max-height: min(58vh, 540px);
        }

        .share-player-actions {
          margin-top: 10px;
        }

        .share-player-button,
        .share-player-link {
          min-height: 48px;
          font-size: 15px;
        }
      }

      .share-player-button:disabled,
      .share-player-link[aria-disabled="true"] {
        opacity: 0.48;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <main class="share-player-page">
      <div class="share-player-topbar">
        <button class="share-player-back" id="share-player-back" type="button">
          Назад
        </button>
      </div>
      <section class="share-player-card">
        <h1 class="share-player-title" id="share-player-title">Готовая коробка</h1>
        <p class="share-player-status" id="share-player-status" hidden></p>

        <div class="share-player-frame">
          <div class="share-player-loader" id="share-player-loader">
            <div class="share-player-loader-shell">
              <div class="share-player-spinner" aria-hidden="true"></div>
              <p class="share-player-loader-title" id="share-player-loader-title">Собираем!</p>
              <p class="share-player-loader-copy" id="share-player-loader-copy">15 секунд</p>
            </div>
          </div>
          <video
            class="share-player-video"
            id="share-player-video"
            muted
            autoplay
            controls
            playsinline
            preload="metadata"
          ></video>
        </div>

        <div class="share-player-actions">
          <button class="share-player-button" id="share-player-share" type="button" disabled>
            Поделиться
          </button>
          <a class="share-player-link" id="share-player-download" href="/" aria-disabled="true">
            Скачать
          </a>
        </div>
      </section>
    </main>

    <script src="./share-player.js"></script>
  </body>
</html>
